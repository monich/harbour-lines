<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg version="1.1" width="100" height="100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="linear">
      <stop offset="0" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="1" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="gradient" xlink:href="#linear" cx="50" cy="50" fx="50" fy="50" r="50" gradientUnits="userSpaceOnUse"/>
  </defs>
  <rect style="fill:#ffffff;opacity:0" width="100" height="100"/>
  <circle style="fill:url(#gradient)" cx="50" cy="50" r="50"/>
</svg>
